<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RiegoCheck — Diagnóstico de Riego</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --warn: #ff9500;
    --danger: #ff4444;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .app-title span { color: var(--accent); }
  .back-btn {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .back-btn.visible { display: flex; }

  /* ── BREADCRUMB ── */
  #breadcrumb {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    overflow: hidden;
  }
  .crumb { color: var(--muted); cursor: pointer; }
  .crumb:hover { color: var(--accent); }
  .crumb-sep { opacity: 0.4; }
  .crumb.active { color: var(--text); cursor: default; }

  /* ── SCREENS ── */
  #app { padding: 16px; max-width: 520px; margin: 0 auto; }

  /* HOME SCREEN */
  .home-header {
    text-align: center;
    padding: 24px 0 20px;
  }
  .home-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .home-header p { color: var(--muted); font-size: 14px; }

  .symptom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
  }
  .symptom-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .symptom-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }
  .symptom-card:active { transform: scale(0.97); }
  .symptom-card:hover { border-color: var(--accent); background: var(--surface2); }

  .sc-motor::before   { background: linear-gradient(90deg, #ff4444, #ff9500); }
  .sc-ev-open::before { background: linear-gradient(90deg, #00d4ff, #0099cc); }
  .sc-ev-close::before{ background: linear-gradient(90deg, #8b5cf6, #00d4ff); }
  .sc-elec::before    { background: linear-gradient(90deg, #ffd700, #ff9500); }
  .sc-zone::before    { background: linear-gradient(90deg, #00ff9d, #00d4ff); }
  .sc-nowater::before { background: linear-gradient(90deg, #ff4444, #8b5cf6); }
  .sc-lowpress::before{ background: linear-gradient(90deg, #ff9500, #ffd700); }
  .sc-emisor::before  { background: linear-gradient(90deg, #00ff9d, #00d4ff); }
  .sc-controlador::before { background: linear-gradient(90deg, #8b5cf6, #00d4ff); }
  .sc-fuga::before        { background: linear-gradient(90deg, #00d4ff, #0066ff); }

  .sc-icon { font-size: 26px; margin-bottom: 8px; display: block; }
  .sc-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    line-height: 1.2;
    color: var(--text);
  }
  .sc-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* STEP SCREEN */
  .step-screen { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .step-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .step-module {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .step-question {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 10px;
  }
  .step-note {
    font-size: 13px;
    color: var(--muted);
    border-left: 3px solid var(--border);
    padding-left: 10px;
    line-height: 1.5;
  }
  .step-note.info { border-color: var(--accent); color: #9ecbff; }
  .step-note.warn { border-color: var(--warn); color: #ffd9a0; }

  /* ADVERTENCIA DE SEGURIDAD PARPADEANTE */
  .safety-warning {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 68, 68, 0.12);
    border: 2px solid var(--danger);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 10px;
    animation: pulse-border 1.2s ease-in-out infinite;
  }
  .safety-warning-icon {
    font-size: 24px;
    animation: pulse-icon 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .safety-warning-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #ff6b6b;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }
  .safety-warning-text span {
    display: block;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 2px;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: var(--danger); box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
    50% { border-color: #ff8080; box-shadow: 0 0 0 6px rgba(255,68,68,0); }
  }
  @keyframes pulse-icon {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* MICRO-AYUDA */
  .micro-help { margin-top: 10px; }
  .micro-help-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    font-family: 'Barlow', sans-serif;
    padding: 5px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }
  .micro-help-btn:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }
  .micro-help-content {
    display: none;
    margin-top: 8px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #9ecbff;
    line-height: 1.6;
  }
  .micro-help-content.open { display: block; animation: fadeIn 0.2s ease; }
  .micro-help-content ol { padding-left: 16px; margin-top: 4px; }
  .micro-help-content ol li { margin-bottom: 4px; }

  /* OPTIONS */
  .options-list { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn:hover { border-color: var(--accent); background: var(--surface2); }
  .option-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .opt-yes .option-icon { background: rgba(0,255,157,0.15); }
  .opt-no  .option-icon { background: rgba(255,68,68,0.15); }
  .opt-high .option-icon{ background: rgba(255,68,68,0.15); }
  .opt-low  .option-icon{ background: rgba(255,149,0,0.15); }
  .opt-zero .option-icon{ background: rgba(125,133,144,0.15); }
  .opt-ok   .option-icon{ background: rgba(0,212,255,0.15); }
  .opt-normal .option-icon{ background: rgba(0,212,255,0.15); }
  .opt-inf  .option-icon{ background: rgba(255,68,68,0.15); }

  .option-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }
  .option-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* RESULT */
  .result-card {
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    animation: fadeIn 0.3s ease;
  }
  .result-card.fault {
    background: rgba(255,68,68,0.08);
    border: 1.5px solid rgba(255,68,68,0.4);
  }
  .result-card.warning {
    background: rgba(255,149,0,0.08);
    border: 1.5px solid rgba(255,149,0,0.4);
  }
  .result-card.info-card {
    background: rgba(0,212,255,0.06);
    border: 1.5px solid rgba(0,212,255,0.3);
  }
  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .result-card.fault .result-badge { background: rgba(255,68,68,0.2); color: #ff6b6b; }
  .result-card.warning .result-badge { background: rgba(255,149,0,0.2); color: #ffb347; }
  .result-card.info-card .result-badge { background: rgba(0,212,255,0.15); color: var(--accent); }

  .result-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .result-actions {
    margin-top: 14px;
  }
  .action-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.4;
  }
  .action-item:last-child { border-bottom: none; }
  .action-num {
    background: var(--surface2);
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* RESTART & HOME BTNS */
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { border-color: var(--accent); }
  .btn-whatsapp {
    background: #25d366;
    border: none;
    color: #fff;
    font-size: 15px;
  }
  .btn-whatsapp:active { transform: scale(0.97); opacity: 0.9; }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* TOOLS CARD */
  .tools-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .tools-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .tools-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tool-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text);
  }

  /* HISTORY PANEL */
  .history-path {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .history-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .history-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .history-q { color: var(--text); }
  .history-a { color: var(--accent2); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">💧</div>
  <div class="app-title"><span>Riego</span>Check</div>
  <button class="back-btn" id="backBtn" onclick="goBack()">← Atrás</button>
</header>
<div id="breadcrumb"></div>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// ÁRBOL DE DIAGNÓSTICO UNIFICADO
// ══════════════════════════════════════════════════════════════════
const TREES = {

  // ─────────────────────────────────────────
  // MÓDULO 1: MOTOR NO ARRANCA
  // ─────────────────────────────────────────
  motor: {
    id: 'motor',
    label: 'El motor no arranca',
    icon: '⚡',
    tools: ['Voltímetro', 'Pinza amperimétrica', 'Destornillador'],
    steps: {
      start: {
        q: '¿El motor es monofásico o trifásico?',
        module: 'Motor · Tipo',
        note: 'Monofásico: 2 cables de alimentación (fase + neutro). Trifásico: 3 cables de fase.',
        noteType: 'info',
        opts: [
          { label: 'Monofásico', sub: '220V — 2 cables', icon: '1️⃣', cls: 'opt-ok', next: 'motor_mono_start' },
          { label: 'Trifásico', sub: '380V — 3 cables', icon: '3️⃣', cls: 'opt-warn', next: 'motor_tri_start' }
        ]
      },

      // ══ ÁRBOL MONOFÁSICO ══
      motor_mono_start: {
        q: '¿Cuál es el voltaje en los bornes del motor?',
        module: 'Motor Monofásico · Alimentación',
        note: 'Medir con el motor intentando arrancar. Usar voltímetro en CA.',
        noteType: 'info',
        microHelp: 'motor_voltage',
        opts: [
          { label: '0 V', sub: 'Sin tensión', icon: '⭕', cls: 'opt-zero', next: 'r_A1' },
          { label: '< 200 V', sub: 'Tensión baja', icon: '⬇️', cls: 'opt-low', next: 'low_voltage' },
          { label: '200–240 V', sub: 'Tensión correcta', icon: '✅', cls: 'opt-ok', next: 'motor_flotante' }
        ]
      },
      low_voltage: {
        q: '¿Cuál es el voltaje directamente en el tablero eléctrico?',
        module: 'Motor · Red eléctrica',
        note: 'Si la tensión en tablero también es baja, el problema está aguas arriba.',
        noteType: 'warn',
        opts: [
          { label: '< 200 V', sub: 'Baja en tablero', icon: '⬇️', cls: 'opt-low', next: 'r_A2' },
          { label: '200–240 V', sub: 'Normal en tablero', icon: '✅', cls: 'opt-ok', next: 'r_A3' }
        ]
      },
      motor_flotante: {
        q: '¿Al puentear el flotante de cisterna el motor arranca?',
        module: 'Motor · Flotante de cisterna',
        note: 'Si hay flotante eléctrico, cortocircuitar sus dos terminales en el tablero o panel de control.',
        noteType: 'info',
        opts: [
          { label: 'Sí, arrancó al puentear', icon: '✅', cls: 'opt-yes', next: 'r_A_flotante' },
          { label: 'No tiene flotante', icon: '➡️', cls: 'opt-ok', next: 'motor_noise' },
          { label: 'Tiene pero no arrancó', icon: '❌', cls: 'opt-no', next: 'motor_noise' }
        ]
      },
      motor_noise: {
        q: '¿Qué comportamiento presenta el motor al accionarlo?',
        module: 'Motor · Comportamiento',
        opts: [
          { label: 'No hace nada', sub: 'Sin sonido, sin movimiento', icon: '🔇', cls: 'opt-zero', next: 'motor_thermal' },
          { label: 'Zumbido (no gira)', sub: 'Sonido pero sin rotación', icon: '🔔', cls: 'opt-warn', next: 'motor_start_current' }
        ]
      },
      motor_thermal: {
        q: '¿El botón de reset del protector térmico está disparado?',
        module: 'Motor · Protector térmico',
        note: 'Botón pequeño en la carcasa del motor. Si saltó, sobresale. Presionarlo toma 10 segundos.',
        noteType: 'warn',
        opts: [
          { label: 'Sí, lo resetié y arrancó', icon: '✅', cls: 'opt-yes', next: 'r_A_thermal' },
          { label: 'Sí, pero sigue sin arrancar', icon: '⚠️', cls: 'opt-warn', next: 'motor_current' },
          { label: 'No estaba disparado', icon: '✅', cls: 'opt-ok', next: 'motor_current' }
        ]
      },
      motor_current: {
        q: '¿Cuánta corriente circula por el circuito del motor?',
        module: 'Motor · Circuito eléctrico',
        note: 'Medir con pinza amperimétrica en cualquiera de las fases.',
        noteType: 'info',
        microHelp: 'motor_current',
        opts: [
          { label: '0 A', sub: 'Sin corriente', icon: '⭕', cls: 'opt-zero', next: 'r_A4' },
          { label: 'Baja (< nominal)', sub: 'Menos del 70% del valor placa', icon: '⬇️', cls: 'opt-low', next: 'r_A5' }
        ]
      },
      motor_start_current: {
        q: '¿Cuánta corriente registrás en el intento de arranque?',
        module: 'Motor · Arranque',
        note: 'La corriente de arranque normal es 4–7× la nominal.',
        noteType: 'info',
        opts: [
          { label: 'Alta (> 7× nominal)', sub: 'Sobrecorriente de arranque', icon: '⬆️', cls: 'opt-high', next: 'motor_shaft' },
          { label: 'Baja o normal', sub: 'Corriente de arranque baja', icon: '⬇️', cls: 'opt-low', next: 'r_A8' }
        ]
      },
      motor_shaft: {
        q: '¿El eje del motor gira libremente a mano?',
        module: 'Motor · Mecánica',
        note: 'Con el motor sin tensión, intentar girar el eje manualmente.',
        noteType: 'warn',
        safetyWarning: true,
        opts: [
          { label: 'NO gira', sub: 'Eje bloqueado', icon: '🔒', cls: 'opt-no', next: 'r_A6' },
          { label: 'SÍ gira', sub: 'Eje libre', icon: '🔓', cls: 'opt-yes', next: 'r_A7' }
        ]
      },

      // ══ ÁRBOL TRIFÁSICO ══
      motor_tri_start: {
        q: '¿Cuál es el voltaje en cada una de las 3 fases en los bornes del motor?',
        module: 'Motor Trifásico · Alimentación',
        note: 'Medir entre cada par de fases. Normal en sistemas 220V fase-neutro: 380–400V entre fases.',
        noteType: 'info',
        microHelp: 'motor_tri_fases',
        opts: [
          { label: 'Las 3 fases con 380–400V', icon: '✅', cls: 'opt-ok', next: 'motor_tri_rele' },
          { label: 'Una o dos fases en 0V o bajas', icon: '🔴', cls: 'opt-no', next: 'r_tri_falta_fase' },
          { label: 'Las 3 fases bajas (< 340V)', icon: '⬇️', cls: 'opt-low', next: 'r_tri_baja_tension' }
        ]
      },
      motor_tri_rele: {
        q: '¿El relé térmico / guardamotor está en posición RUN?',
        module: 'Motor Trifásico · Relé térmico',
        note: 'El guardamotor tiene un botón de reset. Si está disparado, el botón sobresale o hay indicador rojo.',
        noteType: 'warn',

// STATE & NAVIGATION
// ══════════════════════════════════════════════════════════════════
let state = {
  screen: 'home',
  module: null,
  stepId: null,
  history: [], // [{stepId, question, answer}]
  breadcrumbs: ['Inicio']
};

function getStep(moduleId, stepId) {
  return TREES[moduleId]?.steps[stepId];
}

function renderApp() {
  const app = document.getElementById('app');
  const backBtn = document.getElementById('backBtn');
  const bc = document.getElementById('breadcrumb');

  // Back button
  backBtn.classList.toggle('visible', state.screen !== 'home');

  // Breadcrumb
  const crumbs = state.breadcrumbs;
  bc.innerHTML = crumbs.map((c, i) => {
    if (i < crumbs.length - 1) {
      const idx = i;
      return `<span class="crumb" onclick="jumpToCrumb(${idx})">${c}</span><span class="crumb-sep">›</span>`;
    }
    return `<span class="crumb active">${c}</span>`;
  }).join('');

  if (state.screen === 'home') {
    app.innerHTML = renderHome();
  } else if (state.screen === 'step') {
    app.innerHTML = renderStep();
  }
}

function renderHome() {
  const cards = Object.values(TREES).map(t => `
    <div class="symptom-card sc-${t.id}" onclick="startModule('${t.id}')">
      <span class="sc-icon">${t.icon}</span>
      <div class="sc-label">${t.label}</div>
    </div>
  `).join('');

  return `
    <div class="home-header">
      <h1>¿Cuál es el problema principal?</h1>
      <p>Seleccioná el problema que encontrás en el sistema de riego automático</p>
    </div>
    <div class="symptom-grid">${cards}</div>
  `;
}

function renderStep() {
  const tree = TREES[state.module];
  const step = getStep(state.module, state.stepId);
  if (!step) return '<p style="color:red">Error: paso no encontrado</p>';

  if (step.result) {
    return renderResult(tree, step);
  }

  // Progress estimate
  const totalSteps = Object.keys(tree.steps).filter(k => !k.startsWith('r_')).length;
  const currentDepth = Math.min(state.history.length, totalSteps);
  const progress = Math.round((currentDepth / totalSteps) * 100);

  const noteHtml = step.note ? `<div class="step-note ${step.noteType || ''}">${step.note}</div>` : '';
  const microHtml = step.microHelp ? microHelpHTML(step.microHelp) : '';
  const safetyHtml = step.safetyWarning ? `
    <div class="safety-warning">
      <div class="safety-warning-icon">⚡</div>
      <div class="safety-warning-text">
        CORTAR ENERGÍA ANTES DE CONTINUAR
        <span>Desconectar el disyuntor o desenchufar el equipo antes de tocar el motor</span>
      </div>
    </div>` : '';

  const optsHtml = step.opts.map(o => `
    <div class="option-btn ${o.cls || ''}" onclick="chooseOption('${o.next}', '${escHtml(o.label)}')">
      <div class="option-icon">${o.icon || '▸'}</div>
      <div>
        <div class="option-label">${o.label}</div>
        ${o.sub ? `<div class="option-sub">${o.sub}</div>` : ''}
      </div>
    </div>
  `).join('');

  const historyHtml = state.history.length > 0 ? `
    <div class="history-path">
      <div class="history-title">Camino recorrido</div>
      ${state.history.map(h => `
        <div class="history-item">
          <span class="history-q">${h.question.substring(0, 60)}${h.question.length > 60 ? '…' : ''}</span>
          <span style="color:var(--muted)">→</span>
          <span class="history-a">${h.answer}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="step-screen">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      ${historyHtml}
      <div class="step-header">
        <div class="step-module">${step.module || tree.label}</div>
        <div class="step-question">${step.q}</div>
        ${noteHtml}
        ${safetyHtml}
        ${microHtml}
      </div>
      <div class="options-list">${optsHtml}</div>
    </div>
  `;
}

function renderResult(tree, step) {
  const typeLabels = { fault: '🔴 FALLA DETECTADA', warning: '⚠️ ATENCIÓN', info: 'ℹ️ INFORMACIÓN' };
  const label = typeLabels[step.type] || '🔴 FALLA';

  // Urgency indicator
  const urgencyMap = {
    fault: { icon: '🔴', text: 'Parar sistema y reparar ahora', color: '#ff4444' },
    warning: { icon: '🟠', text: 'Reparar esta semana', color: '#ff9500' },
    info: { icon: '🟡', text: 'Monitorear', color: '#ffd700' }
  };
  const urgency = urgencyMap[step.type] || urgencyMap.fault;

  const actionsHtml = (step.actions || []).map((a, i) => `
    <div class="action-item">
      <div class="action-num">${i + 1}</div>
      <div>${a}</div>
    </div>
  `).join('');

  const toolsHtml = tree.tools ? `
    <div class="tools-card">
      <div class="tools-title">🔧 Herramientas para esta tarea</div>
      <div class="tools-list">
        ${tree.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}
      </div>
    </div>
  ` : '';

  const historyHtml = state.history.length > 0 ? `
    <div class="history-path">
      <div class="history-title">Diagnóstico recorrido</div>
      ${state.history.map(h => `
        <div class="history-item">
          <span class="history-q">${h.question.substring(0, 55)}${h.question.length > 55 ? '…' : ''}</span>
          <span style="color:var(--muted)">→</span>
          <span class="history-a">${h.answer}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="step-screen">
      ${historyHtml}
      <div class="result-card ${step.type}">
        <div class="result-badge">${label}</div>
        <div class="result-title">${step.title}</div>
        <div style="display:flex;align-items:center;gap:8px;margin:10px 0 4px;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:8px;">
          <span style="font-size:16px;">${urgency.icon}</span>
          <span style="font-size:12px;font-weight:600;color:${urgency.color};">${urgency.text}</span>
        </div>
        <div class="result-actions">${actionsHtml}</div>
      </div>
      ${toolsHtml}
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="restartModule()">↺ Reiniciar</button>
        <button class="btn btn-primary" onclick="goHome()">⌂ Inicio</button>
      </div>
      <button class="btn btn-whatsapp" onclick="shareWhatsApp()" style="width:100%;margin-top:10px;">
        📲 Compartir por WhatsApp
      </button>
    </div>
  `;
}

function toggleMicroHelp(id) {
  const content = document.getElementById('mh-' + id);
  const btn = document.getElementById('mh-btn-' + id);
  if (!content) return;
  const isOpen = content.classList.toggle('open');
  btn.innerHTML = (isOpen ? '▲ ' : '▼ ') + MICRO_HELP[id].btn;
}

function microHelpHTML(id) {
  if (!MICRO_HELP[id]) return '';
  return `<div class="micro-help">
    <button class="micro-help-btn" id="mh-btn-${id}" onclick="toggleMicroHelp('${id}')">
      ▼ ${MICRO_HELP[id].btn}
    </button>
    <div class="micro-help-content" id="mh-${id}">${MICRO_HELP[id].content}</div>
  </div>`;
}

function shareWhatsApp() {
  const tree = TREES[state.module];
  const step = getStep(state.module, state.stepId);
  if (!step) return;

  const typeLabels = { fault: '🔴 FALLA DETECTADA', warning: '⚠️ ATENCIÓN REQUERIDA', info: 'ℹ️ INFORMACIÓN' };
  const urgencyLabels = { fault: '🔴 *REPARAR DE INMEDIATO*', warning: '🟠 *Reparar esta semana*', info: '🟡 *Monitorear*' };

  const now = new Date();
  const fecha = now.toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const hora = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: true });

  let text = `🔧 *RiegoCheck — Informe de Diagnóstico*\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `📅 ${fecha}\n`;
  text += `🕐 ${hora}\n`;
  text += `📋 Sección: ${tree.label}\n\n`;

  text += `${typeLabels[step.type]}\n`;
  text += `*${step.title}*\n\n`;
  text += `${urgencyLabels[step.type]}\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n\n`;

  if (state.history.length > 0) {
    text += `🔍 *Secuencia de diagnóstico:*\n\n`;
    state.history.forEach((h, i) => {
      text += `${i + 1}. ${h.question}\n`;
      text += `   ↳ ${h.answer}\n\n`;
    });
    text += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  }

  text += `📝 *Notas y recomendaciones:*\n\n`;
  (step.actions || []).forEach((a, i) => {
    text += `${i + 1}. ${a}\n\n`;
  });

  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `_Generado con RiegoCheck_`;

  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ── ACTIONS ──
function startModule(moduleId) {
  state.module = moduleId;
  state.stepId = 'start';
  state.history = [];
  state.screen = 'step';
  state.breadcrumbs = ['Inicio', TREES[moduleId].label];
  renderApp();
  window.scrollTo(0, 0);
}

function chooseOption(nextStepId, answerLabel) {
  const step = getStep(state.module, state.stepId);
  if (step && !step.result) {
    state.history.push({
      stepId: state.stepId,
      question: step.q,
      answer: answerLabel
    });
  }
  state.stepId = nextStepId;

  const nextStep = getStep(state.module, nextStepId);
  if (nextStep && nextStep.result) {
    state.breadcrumbs = [...state.breadcrumbs.slice(0, 2), 'Resultado'];
  } else if (nextStep) {
    const module = nextStep.module || '';
    const parts = module.split('·');
    const label = parts[parts.length - 1]?.trim() || nextStepId;
    state.breadcrumbs = [...state.breadcrumbs.slice(0, 2), label];
  }

  renderApp();
  window.scrollTo(0, 0);
}

function goBack() {
  if (state.history.length > 0) {
    const prev = state.history.pop();
    state.stepId = prev.stepId;
    const crumbs = state.breadcrumbs;
    if (crumbs.length > 2) state.breadcrumbs = crumbs.slice(0, -1);
  } else {
    goHome();
    return;
  }
  renderApp();
  window.scrollTo(0, 0);
}

function goHome() {
  state.screen = 'home';
  state.module = null;
  state.stepId = null;
  state.history = [];
  state.breadcrumbs = ['Inicio'];
  renderApp();
  window.scrollTo(0, 0);
}

function restartModule() {
  const moduleId = state.module;
  startModule(moduleId);
}

function jumpToCrumb(idx) {
  if (idx === 0) { goHome(); return; }
  if (idx === 1 && state.module) { restartModule(); }
}

function escHtml(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── INIT ──
renderApp();
